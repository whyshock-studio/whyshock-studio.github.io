<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>

  <!-- Decorative lens circle -->
  <circle cx="950" cy="315" r="180" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.15"/>
  <circle cx="950" cy="315" r="140" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.1"/>
  <circle cx="950" cy="315" r="100" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.08"/>

  <!-- Accent bar -->
  <rect x="100" y="200" width="60" height="4" rx="2" fill="url(#accent)"/>

  <!-- Eyebrow -->
  <text x="100" y="190" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#a78bfa" letter-spacing="3">FREELANCE PHOTOGRAPHY</text>

  <!-- Title -->
  <text x="100" y="280" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff">WhyShock</text>
  <text x="100" y="350" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff">Studio</text>

  <!-- Subtitle -->
  <text x="100" y="400" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#9ca3af">Photography and cinematic storytelling</text>

  <!-- Tags -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#6b7280">
    <text x="100" y="460">Portraits</text>
    <text x="100" y="460" dx="80">·</text>
    <text x="100" y="460" dx="95">Events</text>
    <text x="100" y="460" dx="160">·</text>
    <text x="100" y="460" dx="175">Product</text>
    <text x="100" y="460" dx="250">·</text>
    <text x="100" y="460" dx="265">Pre-wedding</text>
    <text x="100" y="460" dx="365">·</text>
    <text x="100" y="460" dx="380">Reels</text>
  </g>

  <!-- Domain -->
  <text x="100" y="530" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#4b5563">studio.whyshock.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
