name: Update Instagram Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest Instagram data
        run: node scripts/fetch-instagram-feed.mjs

      - name: Commit feed updates
        run: |
          if git diff --quiet -- data/instagram-feed.json data/instagram-feed.js data/media; then
            echo "No feed changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram-feed.json data/instagram-feed.js data/media
          git commit -m "chore: refresh Instagram feed"
          git push
